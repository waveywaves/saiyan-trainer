apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-evaluation
  labels:
    grafana_dashboard: "1"
data:
  evaluation-results.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "10.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "panel",
          "id": "bargauge",
          "name": "Bar gauge",
          "version": ""
        },
        {
          "type": "panel",
          "id": "stat",
          "name": "Stat",
          "version": ""
        },
        {
          "type": "panel",
          "id": "timeseries",
          "name": "Time series",
          "version": ""
        }
      ],
      "id": null,
      "uid": "saiyan-eval-results",
      "title": "Saiyan Trainer - Evaluation Results",
      "description": "Evaluation fight results: win rates, total fights, and best fitness by run.",
      "tags": ["saiyan-trainer", "neat", "evaluation"],
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "run_id",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(neat_eval_win_rate, run_id)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Win Rate by Run",
          "type": "bargauge",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "percentage",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 30 },
                  { "color": "green", "value": 60 }
                ]
              },
              "min": 0,
              "max": 100,
              "unit": "percent",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_eval_win_rate{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["last"],
              "fields": "",
              "values": false
            },
            "orientation": "horizontal",
            "displayMode": "gradient",
            "showUnfilled": true
          }
        },
        {
          "id": 2,
          "title": "Evaluation Fights",
          "type": "stat",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 10 }
                ]
              },
              "unit": "none",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_eval_total_fights{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["last"],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        },
        {
          "id": 3,
          "title": "Best Fitness by Run",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 10 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "fillOpacity": 10
              },
              "unit": "none",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_eval_best_fitness{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["max", "last"] },
            "tooltip": { "mode": "multi" }
          }
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
    
