# Grafana dashboard ConfigMaps for k8s-sidecar auto-provisioning.
# The grafana_dashboard: "1" label tells the kiwigrid/k8s-sidecar
# container to load these dashboards into Grafana automatically.
#
# The dashboard JSON files also exist separately under dashboards/
# for version control readability. These ConfigMaps embed them for
# Kubernetes-native provisioning.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-fitness
  labels:
    grafana_dashboard: "1"
data:
  fitness-curves.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource",
          "pluginId": "prometheus",
          "pluginName": "Prometheus"
        }
      ],
      "__requires": [
        {
          "type": "grafana",
          "id": "grafana",
          "name": "Grafana",
          "version": "10.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus",
          "name": "Prometheus",
          "version": "1.0.0"
        },
        {
          "type": "panel",
          "id": "timeseries",
          "name": "Time series",
          "version": ""
        },
        {
          "type": "panel",
          "id": "stat",
          "name": "Stat",
          "version": ""
        }
      ],
      "id": null,
      "uid": "saiyan-fitness-curves",
      "title": "Saiyan Trainer - Fitness Curves",
      "description": "NEAT training fitness over generations. Tracks max and average fitness per run.",
      "tags": ["saiyan-trainer", "neat", "fitness"],
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "refresh": "10s",
      "templating": {
        "list": [
          {
            "name": "run_id",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(neat_fitness_max, run_id)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": {
              "selected": true,
              "text": "All",
              "value": "$__all"
            }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Max Fitness Over Generations",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 0 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "fillOpacity": 10
              },
              "unit": "none",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_fitness_max{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["max", "last"] },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 2,
          "title": "Average Fitness Over Generations",
          "type": "timeseries",
          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 0 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "drawStyle": "line",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": true,
                "fillOpacity": 10
              },
              "unit": "none",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_fitness_avg{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "last"] },
            "tooltip": { "mode": "multi" }
          }
        },
        {
          "id": 3,
          "title": "Generation Progress",
          "type": "stat",
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 10 },
          "datasource": "Prometheus",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null },
                  { "color": "green", "value": 100 }
                ]
              },
              "unit": "none",
              "displayName": "Run ${__field.labels.run_id}"
            },
            "overrides": []
          },
          "targets": [
            {
              "expr": "neat_generation{run_id=~\"$run_id\"}",
              "legendFormat": "Run {{run_id}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["last"],
              "fields": "",
              "values": false
            },
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto"
          }
        }
      ],
      "schemaVersion": 39,
      "version": 1
    }
    
---
